<!doctype html>
<html>
  <head>
    <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
    <base href="$FLUTTER_BASE_HREF" />

    <meta charset="UTF-8" />
    <meta content="IE=Edge" http-equiv="X-UA-Compatible" />
    <meta name="description" content="See where transit takes you!" />

    <!-- iOS meta tags & icons -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black" />
    <meta name="apple-mobile-web-app-title" content="Station Reach" />
    <link rel="apple-touch-icon" href="icons/Icon-192.png" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="favicon.png" />

    <title>Station Reach</title>
    <link rel="manifest" href="manifest.json" />

    <script src="https://unpkg.com/maplibre-gl@^5.0/dist/maplibre-gl.js"></script>
    <link
      href="https://unpkg.com/maplibre-gl@^5.0/dist/maplibre-gl.css"
      rel="stylesheet"
    />
    <!-- Next line only required if you want to use PMTiles as source. -->
    <script src="https://unpkg.com/pmtiles@^4.0/dist/pmtiles.js"></script>

    <style>
      #loading {
        position: fixed;
        inset: 0;
        z-index: 999999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 1.25rem;
        background: #fff;
        font-family:
          system-ui,
          -apple-system,
          sans-serif;
      }
      #loading .spinner {
        width: 2.5rem;
        height: 2.5rem;
        border: 3px solid rgba(83, 141, 196, 0.25);
        border-top-color: #53a4c4;
        border-radius: 50%;
        animation: loading-spin 0.85s linear infinite;
      }
      #loading .label {
        font-size: 0.95rem;
        font-weight: 500;
        color: rgba(0, 0, 0, 0.55);
      }
      @keyframes loading-spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <div id="loading" aria-busy="true" aria-live="polite">
      <div class="spinner" role="progressbar" aria-label="Loading"></div>
      <span class="label">Loading Station Reach…</span>
    </div>
    <script>
      window.addEventListener("flutter-first-frame", function () {
        const el = document.getElementById("loading");
        if (el) el.remove();
      });
    </script>
    <script src="flutter_bootstrap.js" async></script>
  </body>
</html>
